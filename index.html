<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAIA - Matrix AI Analyst</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --matrix-dark: #003b00;
            --bg-black: #0d0208;
            --terminal-font: 'Courier New', Courier, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: var(--matrix-green);
            font-family: var(--terminal-font);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.15;
        }

        header {
            padding: 20px;
            border-bottom: 2px solid var(--matrix-green);
            background: rgba(0, 0, 0, 0.8);
            text-align: center;
            box-shadow: 0 0 15px var(--matrix-green);
        }

        h1 {
            font-size: 24px;
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--matrix-green);
            text-transform: uppercase;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 30px;
            flex: 1;
            overflow-y: auto;
        }

        .bot-card {
            background: rgba(0, 59, 0, 0.1);
            border: 1px solid var(--matrix-green);
            padding: 20px;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0, 255, 65, 0.2);
            transition: all 0.3s ease;
        }

        .bot-card:hover {
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.4);
            transform: scale(1.02);
        }

        .bot-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--matrix-green);
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .status-badge {
            font-size: 12px;
            padding: 2px 8px;
            background: var(--matrix-green);
            color: black;
            border-radius: 2px;
        }

        .bot-status {
            font-size: 14px;
            margin-top: 10px;
            min-height: 40px;
        }

        .last-update {
            font-size: 10px;
            color: #008f11;
            margin-top: 15px;
            text-align: right;
        }

        .glitch {
            animation: glitch-anim 1s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { text-shadow: 2px 0 red; }
            50% { text-shadow: -2px 0 blue; }
            100% { text-shadow: 0 0 var(--matrix-green); }
        }

        footer {
            padding: 10px;
            font-size: 12px;
            text-align: center;
            border-top: 1px solid var(--matrix-green);
            background: black;
            display: flex;
            justify-content: space-between;
        }

        .data-stream {
            font-size: 11px;
            color: #00b400;
            margin-top: 10px;
            padding: 5px;
            background: rgba(0, 255, 65, 0.05);
            max-height: 180px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            border-left: 1px solid rgba(0, 255, 65, 0.2);
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE and Edge */
        }

        .data-stream::-webkit-scrollbar {
            display: none; /* Hide scrollbar for Chrome, Safari and Opera */
        }

        .data-stream div {
            margin-bottom: 4px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.05);
            animation: fade-in 0.3s ease-out;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .archive-section {
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00b400;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .archive-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .archive-header h2 {
            margin: 0;
            font-size: 16px;
        }

        .toggle-btn {
            background: none;
            border: 1px solid #00b400;
            color: #00b400;
            padding: 2px 8px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
        }

        .toggle-btn:hover {
            background: rgba(0, 255, 65, 0.1);
        }

        .archive-content {
            max-height: 500px;
            overflow-y: auto;
            transition: max-height 0.3s ease-out;
        }

        .archive-content.collapsed {
            max-height: 0;
            overflow: hidden;
            margin: 0;
        }

        .archive-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            color: #00b400;
        }

        .archive-table th {
            text-align: left;
            border-bottom: 2px solid #00b400;
            padding: 10px;
            text-transform: uppercase;
        }

        .archive-table td {
            padding: 10px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.1);
        }

        .status-pass { color: #00ff41; font-weight: bold; }
        .status-fail { color: #ff0000; }
        
        .connection-status {
            color: var(--matrix-green);
        }
        .connection-error {
            color: #ff4d4d;
        }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    
    <header>
        <h1 class="glitch">MAIA SYSTEM MONITOR</h1>
        <p>RE-ENTER THE MATRIX // ICT BOT V1.2</p>
    </header>

    <div class="dashboard" id="bot-grid">
        <!-- Bot cards will be injected here -->
    </div>

    <div class="archive-section" id="archive-section">
        <div class="archive-header" onclick="toggleArchive()">
            <h2 id="archive-title">STRATEGY AUDIT ARCHIVE</h2>
            <button class="toggle-btn" id="toggle-btn">[-]</button>
        </div>
        <div class="archive-content" id="archive-content">
            <table class="archive-table" id="archive-table">
                <thead>
                    <tr>
                        <th>TIME</th>
                        <th>STRATEGY NAME</th>
                        <th>WIN RATE</th>
                        <th>MAX DD</th>
                        <th>SHARPE</th>
                        <th>STATUS</th>
                    </tr>
                </thead>
                <tbody id="archive-body">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <footer>
        <div id="conn-info">SECURE CHANNEL: VPS 64.226.97.23</div>
        <div id="sync-status">SYNC STATUS: PENDING</div>
    </footer>

    <script>
        // Matrix Background
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789$+-*/%=<>!&|?@#{}[]';
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const drops = [];
        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 50);

        // API Fetching
        async function updateDashboard() {
            const syncStatus = document.getElementById('sync-status');
            try {
                const response = await fetch('/api/bot_statuses');
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                const grid = document.getElementById('bot-grid');
                grid.innerHTML = ''; // Clear previous cards
                
                const botNames = Object.keys(data).sort();
                
                if (botNames.length === 0) {
                   syncStatus.innerText = 'SYNC STATUS: NO DATA';
                   syncStatus.className = 'connection-error';
                   setTimeout(updateDashboard, 2000);
                   return;
                }

                botNames.forEach(botName => {
                    const info = data[botName];
                    const card = document.createElement('div');
                    card.className = 'bot-card';
                    
                    const time = new Date(info.last_update).toLocaleTimeString();
                    
                    let logHtml = '';
                    if (info.recent_logs && info.recent_logs.length > 0) {
                        logHtml = info.recent_logs.map(log => `<div>${log}</div>`).join('');
                    } else {
                        logHtml = 'No recent activity logs.';
                    }

                    card.innerHTML = `
                        <div class="bot-name">
                            ${info.agent_name.toUpperCase()}
                            <span class="status-badge">ACTIVE</span>
                        </div>
                        <div class="bot-status">> STATUS: ${info.status}</div>
                        <div class="data-stream" id="log-stream-${botName}">${logHtml}</div>
                        <div class="last-update">L-SYNC: ${time}</div>
                    `;
                    grid.appendChild(card);

                    // Auto-scroll the log container
                    const stream = document.getElementById(`log-stream-${botName}`);
                    if (stream) {
                        stream.scrollTop = stream.scrollHeight;
                    }
                });

                syncStatus.innerText = 'SYNC STATUS: ACTIVE';
                setTimeout(updateDashboard, 2000);
            } catch (error) {
                console.error('Sync Error:', error);
                syncStatus.innerText = 'SYNC STATUS: ERROR';
                setTimeout(updateDashboard, 5000);
            }
        }

        async function updateArchive() {
            try {
                const response = await fetch('/api/backtest_reports');
                const reports = await response.json();
                const body = document.getElementById('archive-body');
                body.innerHTML = '';

                reports.forEach(report => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${report.date}</td>
                        <td>${report.name.substring(0, 25)}...</td>
                        <td>${report.win_rate.toFixed(1)}%</td>
                        <td>${report.max_drawdown.toFixed(1)}%</td>
                        <td>${report.sharpe.toFixed(2)}</td>
                        <td class="${report.passed ? 'status-pass' : 'status-fail'}">
                            ${report.passed ? 'PASSED' : 'FAILED'}
                        </td>
                    `;
                    body.appendChild(row);
                });
                setTimeout(updateArchive, 10000); // Update every 10s
            } catch (error) {
                console.error('Archive Sync Error:', error);
                setTimeout(updateArchive, 15000);
            }
        }

        function toggleArchive() {
            const content = document.getElementById('archive-content');
            const btn = document.getElementById('toggle-btn');
            const isCollapsed = content.classList.toggle('collapsed');
            btn.innerText = isCollapsed ? '[+]' : '[-]';
        }

        updateDashboard();
        updateArchive();

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
