<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singularity HFT Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -1px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border: 1px solid var(--border);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .positive { color: var(--success); }
        .negative { color: var(--danger); }

        .trade-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .trade-card {
            background: var(--card-bg);
            padding: 1.25rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1.5fr;
            align-items: center;
            transition: transform 0.2s;
        }

        .trade-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .ticker { font-weight: 600; font-size: 1.1rem; }
        .direction { font-size: 0.8rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; display: inline-block; }
        .buy { background: #dcfce7; color: #166534; }
        .sell { background: #fee2e2; color: #991b1b; }

        .time { font-size: 0.85rem; color: var(--text-muted); }
        .pnl { font-weight: 700; font-size: 1.1rem; text-align: right; }
        .reason { font-size: 0.85rem; color: var(--text-muted); font-style: italic; }

        .no-trades {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .trade-card {
                grid-template-columns: 1fr 1fr;
                gap: 0.5rem;
            }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">SINGULARITY HFT</div>
            <div class="time" id="current-time">09.04.2026</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Bugünkü Toplam PnL</div>
                <div class="stat-value" id="total-pnl">...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Toplam İşlem</div>
                <div class="stat-value" id="total-trades">...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Win Rate</div>
                <div class="stat-value" id="win-rate">...</div>
            </div>
        </div>

        <h2 style="margin-bottom: 1rem; font-size: 1.25rem;">Bugünkü İşlemler (12:00'den beri)</h2>
        <div class="trade-list" id="trade-list">
            <!-- İşlemler buraya gelecek -->
        </div>
    </div>

    <script>
        async function fetchTrades() {
            try {
                const response = await fetch('/api/trades');
                const data = await response.json();
                
                document.getElementById('total-pnl').innerText = `$${data.summary.total_pnl.toFixed(2)}`;
                document.getElementById('total-pnl').className = 'stat-value ' + (data.summary.total_pnl >= 0 ? 'positive' : 'negative');
                
                document.getElementById('total-trades').innerText = data.summary.total_trades;
                document.getElementById('win-rate').innerText = `%${data.summary.win_rate}`;

                const list = document.getElementById('trade-list');
                list.innerHTML = '';

                if (data.trades.length === 0) {
                    list.innerHTML = '<div class="no-trades">Bugün henüz işlem gerçekleşmedi.</div>';
                    return;
                }

                data.trades.forEach(t => {
                    const card = document.createElement('div');
                    card.className = 'trade-card';
                    card.innerHTML = `
                        <div>
                            <div class="ticker">${t.ticker}</div>
                            <div class="time">${t.timestamp.split(' ')[1]}</div>
                        </div>
                        <div>
                            <span class="direction ${t.direction.toLowerCase()}">${t.direction == 'BUY' ? 'ALIM' : 'SATIM'}</span>
                        </div>
                        <div>
                            <div class="reason">${t.ai_reason || 'Strateji Sinyali'}</div>
                        </div>
                        <div>
                            <div style="font-size:0.8rem; color:#64748b">Fiyat: ${t.entry_price.toFixed(5)}</div>
                        </div>
                        <div class="pnl ${t.pnl >= 0 ? 'positive' : 'negative'}">
                            ${t.pnl >= 0 ? '+' : ''}${t.pnl.toFixed(2)}$
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch (error) {
                console.error('Fetch error:', error);
            }
        }

        setInterval(fetchTrades, 10000);
        fetchTrades();
    </script>
</body>
</html>
